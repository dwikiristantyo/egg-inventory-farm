<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egg Inventory Management System</title>
  <!-- Tailwind CSS & Alpine.js -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans antialiased" x-data="appData()">

  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR NAV (Softr Style Theme) -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0">
      <div class="p-5 border-b border-slate-800 flex items-center space-x-3">
        <div class="bg-amber-500 text-white p-2 rounded-lg font-bold text-xl"><i class="fa-solid fa-egg"></i></div>
        <div>
          <h1 class="font-bold text-white text-base leading-tight">Egg Inventory</h1>
          <p class="text-xs text-slate-400">Farm Stock System</p>
        </div>
      </div>

      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <div class="text-xs font-semibold text-slate-500 px-3 uppercase tracking-wider mb-2">Menu Utama</div>
        
        <!-- Transaksi Submenu -->
        <a href="#" @click="currentTab = 'transaksi'" :class="currentTab === 'transaksi' ? 'bg-amber-500 text-white' : 'hover:bg-slate-800'" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <i class="fa-solid fa-right-left"></i><span>Transaksi Stock</span>
        </a>

        <!-- Report Submenu -->
        <a href="#" @click="currentTab = 'report'" :class="currentTab === 'report' ? 'bg-amber-500 text-white' : 'hover:bg-slate-800'" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <i class="fa-solid fa-chart-pie"></i><span>Report Stock</span>
        </a>

        <!-- Master Data -->
        <div class="pt-4 text-xs font-semibold text-slate-500 px-3 uppercase tracking-wider mb-2">Master Data</div>
        <a href="#" @click="currentTab = 'master_item'" :class="currentTab === 'master_item' ? 'bg-amber-500 text-white' : 'hover:bg-slate-800'" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <i class="fa-solid fa-box-archive"></i><span>Master Item</span>
        </a>
        <a href="#" @click="currentTab = 'master_farm'" :class="currentTab === 'master_farm' ? 'bg-amber-500 text-white' : 'hover:bg-slate-800'" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <i class="fa-solid fa-warehouse"></i><span>Master Farm</span>
        </a>

        <!-- Administrator -->
        <div class="pt-4 text-xs font-semibold text-slate-500 px-3 uppercase tracking-wider mb-2">Administrator</div>
        <a href="#" @click="currentTab = 'admin_user'" :class="currentTab === 'admin_user' ? 'bg-amber-500 text-white' : 'hover:bg-slate-800'" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <i class="fa-solid fa-users-gear"></i><span>User & Access</span>
        </a>
      </nav>

      <div class="p-4 border-t border-slate-800 flex items-center justify-between">
        <div class="text-xs">
          <p class="font-bold text-white">Admin Warehouse</p>
          <span class="inline-flex items-center text-emerald-400"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 mr-1.5"></span>Offline Mode</span>
        </div>
        <i class="fa-solid fa-right-from-bracket text-slate-500 hover:text-white cursor-pointer"></i>
      </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 flex flex-col overflow-y-auto">
      <!-- HEADER BAR -->
      <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10">
        <div>
          <h2 class="text-xl font-bold text-slate-800" x-text="titleMap[currentTab]"></h2>
          <p class="text-xs text-slate-500">Pencatatan dan Manajemen Stock Telur Real-time</p>
        </div>
        <div class="flex items-center space-x-3">
          <span class="text-sm text-slate-600">Active Farm:</span>
          <select class="bg-slate-100 border border-slate-300 text-slate-700 text-sm rounded-lg p-2 font-medium focus:ring-amber-500">
            <option>Farm Utama - Kandang A</option>
            <option>Farm Utama - Kandang B</option>
          </select>
        </div>
      </header>

      <!-- CONTENT BODY -->
      <div class="p-8">
        <!-- TAB 1: TRANSAKSI -->
        <template x-if="currentTab === 'transaksi'">
          <div class="space-y-6">
            <!-- Filter & Action Bar -->
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-wrap items-center justify-between gap-4">
              <div class="flex items-center space-x-3 flex-1">
                <input type="date" class="border border-slate-300 rounded-lg p-2 text-sm">
                <span class="text-slate-400">s/d</span>
                <input type="date" class="border border-slate-300 rounded-lg p-2 text-sm">
                <input type="text" placeholder="Cari item / No Transaksi..." class="border border-slate-300 rounded-lg p-2 text-sm w-64">
              </div>
              <button @click="showModalTrans = true" class="bg-amber-500 hover:bg-amber-600 text-white font-medium text-sm px-4 py-2.5 rounded-lg flex items-center space-x-2 transition shadow-sm">
                <i class="fa-solid fa-plus"></i><span>Transaksi Baru</span>
              </button>
            </div>

            <!-- Tabel Transaksi (Top 30 Baris) -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
              <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200 text-xs font-semibold text-slate-500 uppercase">
                  <tr>
                    <th class="p-4">No Transaksi</th>
                    <th class="p-4">Tanggal</th>
                    <th class="p-4">Tipe Transaksi</th>
                    <th class="p-4">Farm/Warehouse</th>
                    <th class="p-4">Status</th>
                    <th class="p-4 text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 text-sm">
                  <tr class="hover:bg-slate-50">
                    <td class="p-4 font-mono text-amber-600 font-medium">TR-202607-0001</td>
                    <td class="p-4 text-slate-600">21 Jul 2026</td>
                    <td class="p-4"><span class="bg-emerald-100 text-emerald-700 font-semibold px-2.5 py-1 rounded-full text-xs">Barang Masuk</span></td>
                    <td class="p-4 text-slate-600">Farm Utama - Kandang A</td>
                    <td class="p-4"><span class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full text-xs font-medium">Aktif</span></td>
                    <td class="p-4 text-center space-x-2">
                      <button class="text-blue-600 hover:text-blue-800 font-medium"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                      <button class="text-rose-600 hover:text-rose-800 font-medium"><i class="fa-solid fa-trash"></i> Hapus</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </template>

        <!-- TAB 2: REPORT STOCK -->
        <template x-if="currentTab === 'report'">
          <div class="space-y-6">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <h3 class="font-bold text-slate-800 mb-4">Parameter Report</h3>
              <div class="grid grid-cols-4 gap-4">
                <div>
                  <label class="text-xs font-semibold text-slate-600">Warehouse</label>
                  <select class="w-full border border-slate-300 rounded-lg p-2 text-sm mt-1">
                    <option>Farm Utama - Kandang A</option>
                  </select>
                </div>
                <div>
                  <label class="text-xs font-semibold text-slate-600">Tgl Awal</label>
                  <input type="date" class="w-full border border-slate-300 rounded-lg p-2 text-sm mt-1">
                </div>
                <div>
                  <label class="text-xs font-semibold text-slate-600">Tgl Akhir</label>
                  <input type="date" class="w-full border border-slate-300 rounded-lg p-2 text-sm mt-1">
                </div>
                <div class="flex items-end space-x-2">
                  <button class="bg-slate-900 hover:bg-slate-800 text-white text-sm px-4 py-2.5 rounded-lg flex-1 font-medium">Generate</button>
                  <button class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-3 py-2.5 rounded-lg" title="Export Excel"><i class="fa-solid fa-file-excel"></i></button>
                  <button class="bg-rose-600 hover:bg-rose-700 text-white text-sm px-3 py-2.5 rounded-lg" title="Print PDF"><i class="fa-solid fa-print"></i></button>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </main>
  </div>

  <!-- JS APP DATA -->
  <script>
    function appData() {
      return {
        currentTab: 'transaksi',
        showModalTrans: false,
        titleMap: {
          'transaksi': 'Pencatatan Transaksi Stock',
          'report': 'Laporan Mutasi & Saldo Stock',
          'master_item': 'Master Item Barang',
          'master_farm': 'Master Warehouse & Farm',
          'admin_user': 'Pengaturan User & Hak Akses'
        }
      }
    }
  </script>
</body>
</html>
